<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit user</title>
</head>
<body>

<h2>Edit user</h2>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<form th:action="@{/admin/{id}(id=${user.id})}" th:object="${user}" method="post">
    <input type="text" th:field="*{name}" required>
    <input type="text" th:field="*{surname}" required>
    <input type="email" th:field="*{email}" required>
    <input type="text" th:field="*{username}" required>
    <input type="password" name="password" value="" placeholder="New password">

    <div>
        <label th:each="role : ${roles}">
            <input type="checkbox"
                   name="roleIds"
                   th:value="${role.id}"
                   th:checked="${user.roles.contains(role)}">
            <span th:text="${role.name}"></span>
        </label>
    </div>

    <button type="submit">Update</button>
</form>

<br>

<a th:href="@{/admin}">Back to users</a>

</body>
</html>
