<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>

<h2>Admin panel</h2>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<h3>All users</h3>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Surname</th>
        <th>Email</th>
        <th>Username</th>
        <th>Roles</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.surname}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.username}"></td>
        <td>
            <span th:each="role : ${user.roles}" th:text="${role.name + ' '}"></span>
        </td>
        <td>
            <form th:action="@{/admin/{id}/edit(id=${user.id})}" method="get">
                <button type="submit">Edit</button>
            </form>
        </td>
        <td>
            <form th:action="@{/admin/{id}/delete(id=${user.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>

<h3>Add user</h3>

<form th:action="@{/admin}" th:object="${newUser}" method="post">
    <input type="text" th:field="*{name}" placeholder="Name" required>
    <input type="text" th:field="*{surname}" placeholder="Surname" required>
    <input type="email" th:field="*{email}" placeholder="Email" required>
    <input type="text" th:field="*{username}" placeholder="Username" required>
    <input type="password" th:field="*{password}" placeholder="Password" required>

    <div>
        <label th:each="role : ${roles}">
            <input type="checkbox" name="roleIds" th:value="${role.id}">
            <span th:text="${role.name}"></span>
        </label>
    </div>

    <button type="submit">Add</button>
</form>

</body>
</html>
