<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>

<h2>All users</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Surname</th>
        <th>Email</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.surname}"></td>
        <td th:text="${user.email}"></td>
        <td>
            <form th:action="@{/users/{id}/edit(id=${user.id})}" method="get">
                <button type="submit">Edit</button>
            </form>
        </td>
        <td>
            <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>

<h2>Add user</h2>

<form th:action="@{/users}" th:object="${newUser}" method="post">
    <input type="text" th:field="*{name}" placeholder="Name" required>
    <input type="text" th:field="*{surname}" placeholder="Surname" required>
    <input type="email" th:field="*{email}" placeholder="Email" required>
    <button type="submit">Add</button>
</form>

</body>
</html>
